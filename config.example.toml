interval_seconds = 172800
keep_last = 5

[storage]
# local / webdav
mode = "local"

[storage.webdav]
# base_url = "https://example.com/dav/backup/"
# username = "user"
# password = "pass"
# verify_tls = true
# timeout_seconds = 60
# upload_concurrency = 2
# max_retries = 3
# retry_backoff_seconds = 2
# verify_after_upload = true
# upload_temp_suffix = ".uploading"
# cleanup_mode = "delete" # delete / trash

[[repos]]
name = "owner/repo"
# 可选：禁用某个仓库（仍保留配置）
enabled = true
# 可选策略字段会在离线导入时写入 repo policy
include_assets = []
exclude_assets = []
asset_types = []
include_prereleases = false
include_drafts = false
keep_last = 3
