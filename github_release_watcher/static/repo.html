<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f10" media="(prefers-color-scheme: dark)" />
    <title>仓库活动 - GitHub Release Watcher</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/repo.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <a class="btn" href="/" style="text-decoration: none">← 返回</a>
          <div class="brand-text">
            <div id="repoTitle" class="title">仓库</div>
            <div id="repoSubtitle" class="subtitle">活动与统计</div>
          </div>
        </div>
        <div class="top-actions">
          <div id="statusBadge" class="badge">加载中…</div>
          <button id="runRepoBtn" class="btn primary" type="button">立即检查</button>
        </div>
      </header>

      <main class="grid">
        <section id="securityBanner" class="security-banner hidden" role="status" aria-live="polite"></section>

        <section id="summarySection" class="card card-status">
          <div class="card-head">
            <div>
              <h2>概览</h2>
              <p class="muted">当前版本、检查计划、下载/清理统计。</p>
            </div>
            <div class="card-actions">
              <button class="btn section-toggle" type="button" data-target="summaryBody">折叠</button>
              <button id="copySummaryBtn" class="btn" type="button">复制摘要</button>
            </div>
          </div>

          <div id="summaryBody" class="section-body">
            <div class="kv">
            <div class="kv-item">
              <div class="kv-k">当前版本</div>
              <div id="currentTag" class="kv-v">-</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">下次检查</div>
              <div id="nextRunAt" class="kv-v muted">-</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">上次检查</div>
              <div id="lastCheckAt" class="kv-v muted">-</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">推荐检查间隔</div>
              <div id="recommendedInterval" class="kv-v">-</div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="kv">
            <div class="kv-item">
              <div class="kv-k">检查次数</div>
              <div id="checksTotal" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">网络失败次数</div>
              <div id="checksNetworkFailed" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">下载次数（资产）</div>
              <div id="downloadsTotal" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">删除旧版本次数</div>
              <div id="cleanupTotal" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">已保存版本数</div>
              <div id="downloadedReleasesTotal" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">下载失败次数</div>
              <div id="downloadErrorsTotal" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">上传重试次数</div>
              <div id="uploadRetryTotal" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">上传校验失败</div>
              <div id="uploadVerifyFailedTotal" class="kv-v">0</div>
            </div>
            <div class="kv-item">
              <div class="kv-k">上传队列深度</div>
              <div id="uploadQueueDepth" class="kv-v">0</div>
            </div>
          </div>
            <p id="updateHint" class="hint"></p>
            <p id="errorHint" class="hint danger"></p>
          </div>
        </section>

        <section id="releasesSection" class="card card-releases">
          <div class="card-head">
            <div>
              <h2>版本</h2>
              <p class="muted">已保存的 Release 版本（来自 state.json）。</p>
            </div>
            <div class="card-actions">
              <button class="btn section-toggle" type="button" data-target="releasesBody">折叠</button>
              <button id="copyReleasesBtn" class="btn" type="button">复制版本列表</button>
            </div>
          </div>
          <div id="releasesBody" class="section-body">
            <p id="releaseStatsHint" class="hint"></p>
            <pre id="releases" class="logs">加载中…</pre>
          </div>
        </section>

        <section id="activitySection" class="card card-logs">
          <div class="card-head">
            <div>
              <h2>活动</h2>
              <p class="muted">下载/清理/检查事件（每仓库独立记录）。</p>
            </div>
            <div class="card-actions">
              <button class="btn section-toggle" type="button" data-target="activityBody">折叠</button>
              <button id="copyActivityBtn" class="btn" type="button">复制活动</button>
            </div>
          </div>
          <div id="activityBody" class="section-body">
            <pre id="activity" class="logs">加载中…</pre>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span class="muted">API: <code>/api/v1</code></span>
      </footer>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <dialog id="loginDialog" class="dialog">
      <form id="loginForm" class="dialog-form">
        <div class="dialog-head">
          <div>
            <h3>登录</h3>
            <p class="muted">默认账号密码为 <code>admin</code> / <code>admin</code>。</p>
          </div>
        </div>

        <p id="loginError" class="hint danger"></p>

        <label class="label" for="loginUsername">账号</label>
        <input id="loginUsername" class="input" autocomplete="username" />

        <label class="label" for="loginPassword">密码</label>
        <input id="loginPassword" class="input" type="password" autocomplete="current-password" />

        <menu class="dialog-actions">
          <button id="loginBtn" class="btn primary" type="submit">登录</button>
        </menu>
      </form>
    </dialog>

    <nav class="mobile-nav" aria-label="快速导航">
      <a class="mobile-nav-item" href="#summarySection">概览</a>
      <a class="mobile-nav-item" href="#releasesSection">版本</a>
      <a class="mobile-nav-item" href="#activitySection">活动</a>
    </nav>
  </body>
</html>
