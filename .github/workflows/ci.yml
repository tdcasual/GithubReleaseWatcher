name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: python -m pip install -e .

      - name: Run Python test suite
        run: python -m pytest -q

      - name: Block tracked local artifacts
        run: |
          forbidden='^\.playwright-cli/|^config\.toml$|^real_state 2\.json$'
          tracked="$(git ls-files | grep -E "$forbidden" || true)"
          if [ -n "$tracked" ]; then
            echo "Forbidden tracked local artifacts found:"
            echo "$tracked"
            exit 1
          fi

      - name: Block legacy runtime tokens
        run: |
          if rg -n '/api/v1|window\.GRW|github_release_watcher\.webapp' github_release_watcher deploy scripts README.md; then
            echo "Legacy token found"
            exit 1
          fi

      - name: Frontend tests and build
        run: |
          npm --prefix frontend install
          npm --prefix frontend test
          npm --prefix frontend run build

      - name: Validate deploy proxy scripts
        run: |
          for f in deploy/vercel/api/v2/*.js deploy/cloudflare-worker/src/*.js; do
            node --check "$f"
          done
