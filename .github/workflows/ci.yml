name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package
        run: python -m pip install -e .

      - name: Run stable Python test suite
        run: python -m pytest -q -k "not download_integration"

      - name: Block tracked local artifacts
        run: |
          forbidden='^\.playwright-cli/|^config\.toml$|^real_state 2\.json$'
          tracked="$(git ls-files | grep -E "$forbidden" || true)"
          if [ -n "$tracked" ]; then
            echo "Forbidden tracked local artifacts found:"
            echo "$tracked"
            exit 1
          fi

      - name: Block v2 compatibility regressions
        run: |
          if rg -n '/api/v1/' github_release_watcher/v2 tests/test_v2_* 2>/dev/null; then
            echo "Detected v1 API path in v2 scope."
            exit 1
          fi
          if rg -n 'queue_status' github_release_watcher/v2 tests/test_v2_* 2>/dev/null; then
            echo "Detected v1 compatibility field 'queue_status' in v2 scope."
            exit 1
          fi

      - name: Validate frontend scripts
        run: |
          for action in github_release_watcher/static/*.js deploy/vercel/public/*.js; do
            node --check "$action"
          done
